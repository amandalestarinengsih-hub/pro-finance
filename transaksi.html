<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ProFinance - Transaksi</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#004ac6' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f7f9fb] text-[#191c1e] min-h-screen flex flex-col">

    <header class="w-full sticky top-0 bg-white shadow-sm z-50 border-b border-[#e2e8f0]">
        <div class="flex justify-between items-center h-16 px-6 max-w-[1280px] mx-auto">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo ProFinance" class="w-8 h-8 object-contain">
                <span class="text-xl text-[#004ac6] font-bold tracking-tight">ProFinance</span>
            </div>
            <nav class="hidden md:block">
                <ul class="flex gap-6 text-sm font-medium items-center">
                    <li><a class="text-[#475569] hover:text-[#004ac6] transition-colors" href="beranda.html">Beranda</a></li>
                    <li><a class="text-[#004ac6] border-b-2 border-[#004ac6] pb-1" href="transaksi.html">Transaksi</a></li>
                    <li><a class="text-[#475569] hover:text-[#004ac6] transition-colors" href="profil.html">Profil</a></li>
                    <li><a class="text-[#475569] hover:text-[#004ac6] transition-colors" href="login.html">Login</a></li>
                </ul>
            </nav>
            <button class="bg-[#004ac6] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#003ea8] transition-all">Sign Up</button>
        </div>
    </header>

    <main class="flex-grow max-w-[1280px] w-full mx-auto px-6 py-10">
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-1/3 bg-white p-6 rounded-xl shadow-sm border border-[#e2e8f0] h-fit">
                <h2 class="text-xl font-bold text-[#004ac6] mb-6">Input Transaksi Baru</h2>
                <div id="alertMessage" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

                <form id="transactionForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-[#475569] mb-1">Nama Transaksi</label>
                        <input id="txNama" class="w-full border border-[#c3c6d7] rounded-lg p-2 text-sm" placeholder="Contoh: Makan Siang" type="text"/>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-[#475569] mb-1">Jumlah (Rp)</label>
                        <input id="txJumlah" class="w-full border border-[#c3c6d7] rounded-lg p-2 text-sm" placeholder="0" type="number"/>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-[#475569] mb-1">Kategori</label>
                        <select id="txKategori" class="w-full border border-[#c3c6d7] rounded-lg p-2 text-sm">
                            <option value="">Pilih Kategori--</option>
                            <option value="Makanan & Minuman">Makanan & Minuman</option>
                            <option value="Transportasi">Transportasi</option>
                            <option value="Hiburan">Hiburan</option>
                            <option value="Tagihan">Tagihan</option>
                        </select>
                    </div>
                    <button class="w-full bg-[#004ac6] text-white font-medium text-sm py-3 rounded-lg hover:bg-[#003ea8]" type="submit">
                        Simpan Transaksi
                    </button>
                </form>
            </div>

            <div class="lg:w-2/3 bg-white rounded-xl shadow-sm border border-[#e2e8f0] overflow-hidden">
                <div class="p-6 border-b border-[#e2e8f0] flex justify-between items-center">
                    <h2 class="text-lg font-bold text-[#191c1e]">Riwayat Transaksi</h2>
                    <button onclick="clearTransactions()" class="text-xs text-red-500 hover:underline">Hapus Semua</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-[#e6e8ea] text-[#434655] uppercase text-[11px] font-bold">
                            <tr>
                                <th class="px-6 py-3">Nama Transaksi</th>
                                <th class="px-6 py-3">Kategori</th>
                                <th class="px-6 py-3 text-right">Jumlah</th>
                            </tr>
                        </thead>
                        <tbody id="transactionTableBody" class="divide-y divide-[#e2e8f0]"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        function loadTransactions() {
            const tableBody = document.getElementById('transactionTableBody');
            tableBody.innerHTML = '';
            let dataTransaksi = JSON.parse(localStorage.getItem('dataTransaksi')) || [];
            if(dataTransaksi.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-slate-400 text-xs">Belum ada data transaksi.</td></tr>`;
                return;
            }
            dataTransaksi.forEach(function(item) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 font-medium">${item.nama}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-blue-50 text-blue-700 rounded text-xs">${item.kategori}</span></td>
                    <td class="px-6 py-4 text-right font-semibold">Rp ${Number(item.jumlah).toLocaleString('id-ID')}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = document.getElementById('txNama').value.trim();
            const jumlah = document.getElementById('txJumlah').value.trim();
            const kategori = document.getElementById('txKategori').value;
            const alertBox = document.getElementById('alertMessage');

            if (nama === '' || jumlah === '' || kategori === '') {
                alertBox.className = "mb-4 p-3 rounded-lg text-sm bg-red-100 text-red-700 block";
                alertBox.innerText = "Error: Semua kolom wajib diisi!";
                return;
            }

            let dataTransaksi = JSON.parse(localStorage.getItem('dataTransaksi')) || [];
            dataTransaksi.push({ nama, jumlah, kategori });
            localStorage.setItem('dataTransaksi', JSON.stringify(dataTransaksi));
            
            alertBox.className = "mb-4 p-3 rounded-lg text-sm bg-green-100 text-green-700 block";
            alertBox.innerText = "Sukses menyimpan transaksi!";
            document.getElementById('transactionForm').reset();
            loadTransactions();
        });

        function clearTransactions() {
            localStorage.removeItem('dataTransaksi');
            loadTransactions();
        }
        window.onload = loadTransactions;
    </script>
</body>
</html>
