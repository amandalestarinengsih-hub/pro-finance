<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ProFinance - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#004ac6' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#f7f9fb] text-[#191c1e] min-h-screen flex flex-col">

    <header class="w-full bg-white shadow-sm border-b border-[#e2e8f0]">
        <div class="flex justify-between items-center h-16 px-6 max-w-[1280px] mx-auto">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo ProFinance" class="w-8 h-8 object-contain">
                <span class="text-xl text-[#004ac6] font-bold tracking-tight">ProFinance</span>
            </div>
            <nav class="hidden md:block">
                <ul class="flex gap-6 text-sm font-medium items-center">
                    <li><a class="text-[#475569] hover:text-[#004ac6] transition-colors" href="beranda.html">Beranda</a></li>
                    <li><a class="text-[#475569] hover:text-[#004ac6] transition-colors" href="transaksi.html">Transaksi</a></li>
                    <li><a class="text-[#475569] hover:text-[#004ac6] transition-colors" href="profil.html">Profil</a></li>
                    <li><a class="text-[#004ac6] border-b-2 border-[#004ac6] pb-1" href="login.html">Login</a></li>
                </ul>
            </nav>
            <button class="bg-[#004ac6] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#003ea8] transition-all">Sign Up</button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-6">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-[#e2e8f0] overflow-hidden">
            <div class="p-6 bg-[#004ac6] text-center text-white">
                <h2 class="text-xl font-bold">Selamat Datang Kembali</h2>
                <p class="text-xs opacity-80 mt-1">Masuk ke dashboard ProFinance Anda</p>
            </div>
            <form action="beranda.html" method="GET" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-[#475569] mb-1">Alamat Email</label>
                    <input required class="w-full border border-[#c3c6d7] rounded-lg p-2.5 text-sm" placeholder="nama@email.com" type="email"/>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-[#475569] mb-1">Kata Sandi</label>
                    <input required class="w-full border border-[#c3c6d7] rounded-lg p-2.5 text-sm" placeholder="••••••••" type="password"/>
                </div>
                <button class="w-full bg-[#004ac6] text-white font-medium text-sm py-3 rounded-lg shadow-sm hover:bg-[#003ea8]" type="submit">
                    Masuk
                </button>
            </form>
        </div>
    </main>

    <footer class="w-full bg-white border-t border-[#e2e8f0] mt-auto py-6">
        <div class="max-w-[1280px] mx-auto px-6 text-xs text-[#475569]">
            <span>© 2026 ProFinance Inc. All rights reserved.</span>
        </div>
    </footer>

</body>
</html>
